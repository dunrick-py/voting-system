<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Live Election Tally</title>
</head>
<body class="bg-slate-900 text-white min-h-screen flex items-center justify-center">
    <div class="bg-slate-800 p-12 rounded-3xl shadow-2xl w-full max-w-xl">
        <h2 class="text-3xl font-black mb-8 text-center border-b border-slate-700 pb-4">REAL-TIME AUDIT</h2>
        
        <div class="space-y-10">
            {% for candidate, count in results.items() %}
            <div>
                <div class="flex justify-between text-lg font-bold mb-2">
                    <span>{{ candidate }}</span>
                    <span class="font-mono text-blue-400">{{ count }}</span>
                </div>
                <div class="w-full bg-slate-700 h-3 rounded-full">
                    <div class="bg-blue-500 h-3 rounded-full shadow-[0_0_10px_#3b82f6]" style="width: {{ count * 10 or 1 }}%"></div>
                </div>
            </div>
            {% endfor %}
        </div>

        <div class="mt-12 flex flex-col gap-4">
            <a href="/" class="text-center text-slate-400 hover:text-white transition font-bold underline">Return to Ballot Box</a>
        </div>
    </div>
</body>
</html>
